<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!--
    X-Ray brand mark.

    Theme: "see through to what the network has already said". A
    circular scan/lens viewport, framed by faint scan rings,
    crossed by an angled "X" that doubles as crosshairs and as
    the brand letter. Purple stays consistent with the prior
    placeholder so anyone who pinned the icon doesn't lose
    visual continuity.
  -->

  <!-- Background tile (rounded square) -->
  <rect x="0" y="0" width="128" height="128" rx="22" fill="#7c5cff"/>

  <!-- Faint scan rings -->
  <g stroke="#ffffff" fill="none" opacity="0.18">
    <circle cx="64" cy="64" r="50" stroke-width="1"/>
    <circle cx="64" cy="64" r="40" stroke-width="1"/>
  </g>

  <!-- Lens viewport (the "see-through" affordance) -->
  <circle cx="64" cy="64" r="34" fill="#ffffff" opacity="0.10"/>
  <circle cx="64" cy="64" r="34" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85"/>

  <!-- "X" — bold strokes, slightly rotated to feel like crosshairs -->
  <g stroke="#ffffff" stroke-width="11" stroke-linecap="round">
    <line x1="44" y1="44" x2="84" y2="84"/>
    <line x1="84" y1="44" x2="44" y2="84"/>
  </g>

  <!-- Tiny tick marks suggesting a scan — barely visible, adds depth -->
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="64" y1="22" x2="64" y2="28"/>
    <line x1="64" y1="100" x2="64" y2="106"/>
    <line x1="22" y1="64" x2="28" y2="64"/>
    <line x1="100" y1="64" x2="106" y2="64"/>
  </g>
</svg>
