name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    name: build + lint + package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install web-ext
        run: npm install --global web-ext@latest

      - name: Show versions
        run: |
          node --version
          web-ext --version

      - name: Syntax-check source JS
        # Defence-in-depth: catches accidental syntax regressions in the
        # ES module sources before esbuild bundles them.
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            node --check "$f" || fail=1
          done < <(find src -name '*.js' -type f)
          exit "$fail"

      - name: Build bundles (esbuild)
        run: npm run build

      - name: Run unit tests
        # Phase 1 lands the crypto test suite; until then there's nothing
        # under tests/ and `node --test` is a no-op.
        run: |
          if compgen -G "tests/*.test.*" > /dev/null; then
            npm test
          else
            echo "No tests yet; skipping."
          fi

      - name: web-ext lint
        # Default: warnings non-fatal, errors fail the job.
        run: web-ext lint --source-dir . --self-hosted

      - name: web-ext build
        run: web-ext build --source-dir . --artifacts-dir web-ext-artifacts --overwrite-dest

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: xray-unpacked-${{ github.sha }}
          path: web-ext-artifacts/*.zip
          if-no-files-found: error
          retention-days: 14
