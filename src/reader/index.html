<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X-Ray Reader</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body class="xr-reader">
  <header class="xr-reader__chrome">
    <div class="xr-reader__chrome-left">
      <span class="xr-reader__brand">🩻 X-Ray</span>
    </div>
    <nav class="xr-reader__modes" role="tablist" aria-label="View mode">
      <button class="xr-reader__mode-btn xr-reader__mode-btn--active" data-mode="reader"   role="tab" aria-selected="true">Reader</button>
      <button class="xr-reader__mode-btn"                              data-mode="markdown" role="tab" aria-selected="false">Markdown</button>
      <button class="xr-reader__mode-btn"                              data-mode="preview"  role="tab" aria-selected="false">Preview</button>
    </nav>
    <div class="xr-reader__chrome-right">
      <!-- LLM-assist (Phase 14.5): hidden unless the llmAssist flag is on.
           Sends the article text to Anthropic and opens a review panel of
           draft suggestions — nothing saves or publishes without Accept. -->
      <button class="xr-reader__btn xr-reader__btn--ghost" id="xr-suggest" title="Suggest capture artifacts with an LLM" hidden>
        ✨ Suggest…
      </button>
      <!-- Media & transcript (Phase 22): declare what this URL contains
           (podcast / video), set the universal podcast IDs, and attach a
           pasted/uploaded transcript to THIS capture. Hidden on
           read-only opens. -->
      <button class="xr-reader__btn xr-reader__btn--ghost" id="xr-media-btn" title="Declare media type (podcast / video) and attach a transcript">
        🎙 Media…
      </button>
      <button class="xr-reader__btn xr-reader__btn--ghost" id="xr-entities" title="Open entity browser in the side panel">
        👤 Entities
      </button>
      <button class="xr-reader__btn xr-reader__btn--ghost" id="xr-close" title="Close tab">✕</button>
      <button class="xr-reader__btn xr-reader__btn--primary" id="xr-publish" title="Publish to NOSTR">
        Publish
      </button>
    </div>
    <!-- Thin progress track under the header while a batch publish runs. -->
    <div class="xr-reader__progress" id="xr-progress" hidden>
      <div class="xr-reader__progress-bar" id="xr-progress-bar"></div>
    </div>
  </header>

  <main class="xr-reader__main" id="xr-main">
    <div class="xr-reader__loading" id="xr-loading">
      <div class="xr-reader__spinner"></div>
      <p>Loading article…</p>
    </div>
  </main>

  <!-- Entities bar. Populated by reader/index.js via the entity tagger:
       one chip per entity tagged on THIS article, with its verbatim
       mention as the tooltip and click-to-locate in the body. -->
  <div id="xr-entities-host"></div>

  <!-- Claims bar. Populated by reader/index.js via the claim extractor.
       Hosts one card per claim attached to this article's source_url,
       with edit + delete affordances. -->
  <div id="xr-claims-host"></div>

  <!-- Epistemic audit (Phase 13.5/13.6): import bar + audit panel.
       Firewall note: this section never visually merges with the
       claims/assessment UI above it — separate blocks, separate
       provenance, separate color scales. -->
  <section class="xr-audit" id="xr-audit">
    <div class="xr-audit__bar">
      <span class="xr-audit__label">Epistemic audit</span>
      <span class="xr-audit__status" id="xr-audit-status">No audit imported for this capture.</span>
      <!-- In-extension auditor (LLM): hidden unless the llmAssist flag is on. -->
      <button type="button" class="xr-reader__btn xr-reader__btn--ghost" id="xr-audit-run" title="Quick epistemic audit — one LLM pass (cheaper, lower rigor)" hidden>Quick audit</button>
      <button type="button" class="xr-reader__btn xr-reader__btn--ghost" id="xr-audit-run-thorough" title="Thorough epistemic audit — one LLM call per dimension (higher rigor, ~8× the cost)" hidden>Thorough audit</button>
      <button type="button" class="xr-reader__btn xr-reader__btn--ghost" id="xr-audit-import">Import audit JSON…</button>
      <input type="file" id="xr-audit-file" accept="application/json,.json" hidden />
    </div>
    <div class="xr-audit__body" id="xr-audit-body"></div>
  </section>

  <!-- Forensic findings bar (Phase 14). Populated by reader/index.js:
       per-subject behavioral maneuvers, evidence-anchored, no verdict. -->
  <div id="xr-findings-host"></div>

  <!-- Lens readings (Phase 16): per-jurisdiction perspectival readings
       of the selected claims, grounded in each jurisdiction's own
       loaded corpus — never a truth call. Hidden unless the moralLens
       flag is on. Derived view only: session-cached, never durably
       saved, no wire kind. Firewall note: like the audit section, this
       block never visually merges with the claims/assessment UI —
       separate block, separate provenance, separate vocabulary. -->
  <section class="xr-lensread" id="xr-lensread" hidden>
    <div class="xr-lensread__bar">
      <span class="xr-lensread__label">Lens readings</span>
      <span class="xr-lensread__status" id="xr-lensread-status">No lens pass run for this capture.</span>
      <button type="button" class="xr-reader__btn xr-reader__btn--ghost" id="xr-lensread-run" title="Read selected claims under selected jurisdictions — one LLM call per jurisdiction" hidden>Run lens reading…</button>
    </div>
    <div class="xr-lensread__body" id="xr-lensread-body"></div>
  </section>

  <!-- Comments section. Shown only when the article has a postId from
       a platform that supports comment capture (Substack today). The
       inner HTML is populated by reader/index.js. -->
  <section class="xr-comments" id="xr-comments" hidden>
    <header class="xr-comments__head">
      <h2 class="xr-comments__title" id="xr-comments-title">Comments</h2>
      <label class="xr-comments__include">
        <input type="checkbox" id="xr-comments-include" />
        <span id="xr-comments-include-label">Include in publish</span>
      </label>
    </header>
    <div class="xr-comments__body" id="xr-comments-body"></div>
  </section>

  <div class="xr-reader__toast" id="xr-toast" hidden></div>

  <script src="../../dist/reader.bundle.js"></script>
</body>
</html>
