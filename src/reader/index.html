<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X-Ray Reader</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body class="xr-reader">
  <header class="xr-reader__chrome">
    <div class="xr-reader__chrome-left">
      <span class="xr-reader__brand">🩻 X-Ray</span>
    </div>
    <nav class="xr-reader__modes" role="tablist" aria-label="View mode">
      <button class="xr-reader__mode-btn xr-reader__mode-btn--active" data-mode="reader"   role="tab" aria-selected="true">Reader</button>
      <button class="xr-reader__mode-btn"                              data-mode="markdown" role="tab" aria-selected="false">Markdown</button>
      <button class="xr-reader__mode-btn"                              data-mode="preview"  role="tab" aria-selected="false">Preview</button>
    </nav>
    <div class="xr-reader__chrome-right">
      <button class="xr-reader__btn xr-reader__btn--ghost" id="xr-entities" title="Open entity browser in the side panel">
        👤 Entities
      </button>
      <button class="xr-reader__btn xr-reader__btn--ghost" id="xr-close" title="Close tab">✕</button>
      <button class="xr-reader__btn xr-reader__btn--primary" id="xr-publish" title="Publish to NOSTR">
        Publish
      </button>
    </div>
    <!-- Thin progress track under the header while a batch publish runs. -->
    <div class="xr-reader__progress" id="xr-progress" hidden>
      <div class="xr-reader__progress-bar" id="xr-progress-bar"></div>
    </div>
  </header>

  <main class="xr-reader__main" id="xr-main">
    <div class="xr-reader__loading" id="xr-loading">
      <div class="xr-reader__spinner"></div>
      <p>Loading article…</p>
    </div>
  </main>

  <!-- Claims bar. Populated by reader/index.js via the claim extractor.
       Hosts one card per claim attached to this article's source_url,
       with edit + delete affordances. -->
  <div id="xr-claims-host"></div>

  <!-- Comments section. Shown only when the article has a postId from
       a platform that supports comment capture (Substack today). The
       inner HTML is populated by reader/index.js. -->
  <section class="xr-comments" id="xr-comments" hidden>
    <header class="xr-comments__head">
      <h2 class="xr-comments__title" id="xr-comments-title">Comments</h2>
      <label class="xr-comments__include">
        <input type="checkbox" id="xr-comments-include" />
        <span id="xr-comments-include-label">Include in publish</span>
      </label>
    </header>
    <div class="xr-comments__body" id="xr-comments-body"></div>
  </section>

  <div class="xr-reader__toast" id="xr-toast" hidden></div>

  <script src="../../dist/reader.bundle.js"></script>
</body>
</html>
