<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>X-Ray</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="xr-popup__header">
    <div class="xr-popup__logo">🩻</div>
    <div class="xr-popup__title">
      <div class="xr-popup__name">X-Ray</div>
      <div class="xr-popup__tagline">Article capture for NOSTR</div>
    </div>
  </header>

  <section class="xr-popup__status" id="status">
    <div class="xr-popup__status-row">
      <span class="xr-popup__status-label">Signing</span>
      <span class="xr-popup__status-value" id="status-signing">checking…</span>
    </div>
    <div class="xr-popup__status-row">
      <span class="xr-popup__status-label">Relays</span>
      <span class="xr-popup__status-value" id="status-relays">—</span>
    </div>
  </section>

  <section class="xr-popup__actions">
    <button class="xr-popup__btn xr-popup__btn--primary" id="btn-open-capture">
      Open Article Capture
    </button>
    <button class="xr-popup__btn" id="btn-view-keypairs">
      View Keypair Registry
    </button>
    <button class="xr-popup__btn" id="btn-export-keypairs">
      Export Keypair Registry
    </button>
    <button class="xr-popup__btn xr-popup__btn--ghost" id="btn-open-options">
      Settings…
    </button>
  </section>

  <footer class="xr-popup__footer">
    <span id="footer-version">v—</span>
  </footer>

  <script src="../../dist/popup.bundle.js"></script>
</body>
</html>
