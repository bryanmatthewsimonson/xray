<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X-Ray — My Archive</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body class="xr-portal">
  <header class="xr-portal__chrome">
    <div class="xr-portal__chrome-left">
      <span class="xr-portal__brand">🩻 X-Ray — My Archive</span>
    </div>
    <div class="xr-portal__chrome-right">
      <button class="xr-portal__btn xr-portal__btn--ghost" id="xr-import-transcript"
              title="Paste or upload a podcast transcript into the archive">Import transcript…</button>
      <button class="xr-portal__btn xr-portal__btn--ghost" id="xr-import-book"
              title="Import an EPUB book — each chapter becomes a capture, grouped under the book">Import book…</button>
      <button class="xr-portal__btn xr-portal__btn--ghost" id="xr-import-urls"
              title="Paste a URL list — each page is fetched, extracted, and archived">Import URLs…</button>
      <button class="xr-portal__btn" id="xr-refresh" title="Fetch what's new since the last sync">↻ Refresh</button>
      <button class="xr-portal__btn xr-portal__btn--ghost" id="xr-resync"
              title="Drop the local cache and re-fetch everything from the relays">Full resync</button>
    </div>
  </header>
  <div id="xr-import-host"></div>

  <!-- Identity strip: who "me" is, with provenance chips, plus a
       read-only viewer input for OTHER archives (the NIP-07 story —
       see identity.js). Identity is MANAGED in Settings ▸ Signing. -->
  <section class="xr-portal__identity" id="xr-identity">
    <div class="xr-portal__chips" id="xr-identity-chips"></div>
    <form class="xr-portal__add" id="xr-identity-form">
      <input type="text" id="xr-identity-input" placeholder="View another archive: npub1… or hex pubkey" autocomplete="off" />
      <button type="submit" class="xr-portal__btn xr-portal__btn--ghost">Add viewer npub</button>
      <button type="button" class="xr-portal__btn xr-portal__btn--ghost" id="xr-identity-settings" title="Identity is managed in Settings ▸ Signing">Identity settings</button>
    </form>
  </section>

  <!-- Library chrome (Phase 12.2): type tabs + facet bar + search.
       Hidden until a corpus is loaded. -->
  <nav class="xr-portal__tabs" id="xr-tabs" aria-label="Type filter" hidden></nav>

  <div class="xr-portal__facets" id="xr-facets" hidden>
    <input type="search" id="xr-search" placeholder="Search everything…" autocomplete="off" />
    <select id="xr-facet-platform" title="Filter by platform"></select>
    <select id="xr-facet-domain" title="Filter by source domain"></select>
    <select id="xr-facet-case" title="Filter by case"></select>
    <select id="xr-facet-client" title="Filter by publishing client">
      <option value="all">All clients</option>
      <option value="ours">X-Ray only</option>
      <option value="other">Other clients</option>
    </select>
    <select id="xr-facet-status" title="Filter by ledger status" hidden>
      <option value="all">Any ledger status</option>
      <option value="confirmed">✓ Confirmed</option>
      <option value="remote-only">◌ Remote-only</option>
      <option value="no-ledger">No ledger</option>
    </select>
    <label class="xr-portal__group-toggle" title="Group the list by source domain">
      <input type="checkbox" id="xr-group-domain" /> Group by source
    </label>
  </div>

  <!-- Publish-date density (Phase 12.4). Drag across bars to brush a
       range; the Library below filters to it. -->
  <section class="xr-portal__timeline" id="xr-timeline" hidden></section>

  <div class="xr-portal__status" id="xr-status" hidden></div>

  <!-- Ledger vs relay truth (Phase 12.6): "ledger says N; relays
       confirm M; K missing; R remote-only" + the missing list. -->
  <section class="xr-portal__recon" id="xr-recon" hidden></section>

  <main class="xr-portal__main">
    <div class="xr-portal__empty" id="xr-empty" hidden></div>
    <ol class="xr-portal__list" id="xr-list"></ol>
    <!-- Entity spokes graph / case dashboard (Phase 12.5).
         Populated by entity-view.js / case-view.js via the router. -->
    <section class="xr-portal__view" id="xr-view" hidden></section>
  </main>

  <!-- Item inspector drawer (Phase 12.6). -->
  <aside class="xr-portal__inspector" id="xr-inspector" hidden></aside>

  <footer class="xr-portal__footer">
    <span id="xr-footer-relays"></span>
    <span class="xr-portal__footer-note">The portal asks your configured
    relays for events signed by your keys. Relays can see that request.</span>
  </footer>

  <script src="../../dist/portal.bundle.js"></script>
</body>
</html>
