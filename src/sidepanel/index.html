<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X-Ray — Entities</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body class="xr-side">
  <header class="xr-side__chrome">
    <h1 class="xr-side__title">🩻 Entities</h1>
    <button class="xr-side__btn" id="xr-open-portal" title="Open My Archive — everything you've published to NOSTR">Archive</button>
    <button class="xr-side__btn" id="xr-open-network" title="Open the Network page — follow researchers and read their published work" hidden>Network</button>
    <button class="xr-side__btn xr-side__btn--primary" id="xr-new-entity" title="Create a new entity">＋ New</button>
  </header>

  <!-- Views: the list view and the detail view are siblings. Only one
       is visible at a time, toggled by the class `xr-side--detail` on
       <body>. -->

  <section class="xr-side__list-view">
    <div class="xr-side__filters">
      <button class="xr-side__type-chip xr-side__type-chip--active" data-type=""            title="All">All</button>
      <button class="xr-side__type-chip" data-type="person"       title="Person">👤</button>
      <button class="xr-side__type-chip" data-type="organization" title="Organization">🏢</button>
      <button class="xr-side__type-chip" data-type="place"        title="Place">📍</button>
      <button class="xr-side__type-chip" data-type="thing"        title="Thing">🔷</button>
      <button class="xr-side__type-chip" data-type="case"         title="Case">🗂️</button>
    </div>
    <input type="search" class="xr-side__search" id="xr-search"
           placeholder="Search by name…" spellcheck="false" />
    <div class="xr-side__list" id="xr-list"></div>
    <footer class="xr-side__footer">
      <span id="xr-count" class="xr-side__count">—</span>
      <div class="xr-side__footer-actions">
        <button class="xr-side__ghost-btn" id="xr-health" title="Duplicate report — likely double-minted entities">Health</button>
        <button class="xr-side__ghost-btn" id="xr-export" title="Export registry as JSON">Export</button>
        <button class="xr-side__ghost-btn" id="xr-import" title="Import registry JSON">Import</button>
        <input type="file" id="xr-import-input" accept="application/json,.json" hidden />
      </div>
    </footer>

    <!-- Sync section — collapsed by default. Expands to show user-
         identity status, import/export nsec, and push/pull/clear
         buttons that round-trip the registry through relays via
         kind-30078 + NIP-44 v2 encrypt-to-self. -->
    <details class="xr-sync" id="xr-sync-section">
      <summary class="xr-sync__summary">
        <span>🔒 Sync across devices</span>
        <span class="xr-sync__status" id="xr-sync-status">—</span>
      </summary>
      <div class="xr-sync__body" id="xr-sync-body">
        <!-- Populated by sidepanel/index.js based on whether the user
             has a primary identity configured. -->
      </div>
    </details>
  </section>

  <!-- Entity health (Phase 17A E1): the deterministic duplicate
       report. Detectors only SORT BY SUSPICION — every merge/dismiss
       is a human action. -->
  <section class="xr-side__health-view" hidden>
    <header class="xr-side__detail-head">
      <button class="xr-side__ghost-btn" id="xr-health-back" title="Back to list">← Back</button>
      <span class="xr-side__health-title">Entity health</span>
    </header>
    <div class="xr-side__detail-body" id="xr-health-body"></div>
  </section>

  <section class="xr-side__detail-view" hidden>
    <header class="xr-side__detail-head">
      <button class="xr-side__ghost-btn" id="xr-back" title="Back to list">← Back</button>
      <button class="xr-side__ghost-btn xr-side__ghost-btn--danger" id="xr-delete" title="Delete this entity">Delete</button>
    </header>
    <div class="xr-side__detail-body" id="xr-detail"></div>
  </section>

  <div class="xr-side__toast" id="xr-toast" hidden></div>

  <script src="../../dist/sidepanel.bundle.js"></script>
</body>
</html>
